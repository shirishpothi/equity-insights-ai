name: Deploy to Vercel

on:
  # Disabled - Use Vercel's automatic GitHub integration instead
  # push:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Vercel deployment skipped
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        run: |
          echo "⚠️ Vercel deployment skipped - VERCEL_TOKEN secret not configured"
          echo "To enable Vercel deployment via GitHub Actions:"
          echo "1. Go to your GitHub repository settings"
          echo "2. Navigate to Secrets and variables > Actions"
          echo "3. Add the following secrets:"
          echo "   - VERCEL_TOKEN: Your Vercel token"
          echo "   - VERCEL_ORG_ID: Your Vercel organization ID"
          echo "   - VERCEL_PROJECT_ID: Your Vercel project ID"
          echo ""
          echo "Alternatively, use Vercel's automatic GitHub integration for deployments."
